<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>明星臉大挑戰</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --gold: #FFD700;
    --hot: #FF3366;
    --dark: #0A0A0F;
    --card: #13131A;
    --border: #2A2A3A;
    --text: #F0F0FF;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,51,102,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(255,215,0,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .title-tag {
    display: inline-block;
    background: var(--hot);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 4px;
    line-height: 0.9;
    background: linear-gradient(135deg, var(--gold), #FFA500, var(--hot));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* Upload Grid */
  .upload-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }

  .upload-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    transition: border-color 0.3s;
  }

  .upload-card:hover { border-color: rgba(255,215,0,0.4); }

  .upload-card.has-image { border-color: rgba(255,215,0,0.3); }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    background: rgba(255,215,0,0.03);
  }

  .drop-zone img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }

  .drop-icon {
    font-size: 36px;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  .drop-text {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 10;
  }

  /* Wiki input */
  .wiki-input-wrap {
    margin-top: 14px;
  }

  .wiki-input-wrap label {
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .wiki-input-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.3s;
    outline: none;
  }

  .wiki-input-wrap input:focus { border-color: var(--gold); }
  .wiki-input-wrap input::placeholder { color: var(--muted); }

  /* Action button */
  .action-wrap { text-align: center; margin: 10px 0 40px; }

  .btn-compare {
    background: linear-gradient(135deg, var(--gold), #FFA500);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    padding: 16px 52px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-compare::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  .btn-compare:hover::before { transform: translateX(0); }
  .btn-compare:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(255,215,0,0.35); }
  .btn-compare:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }

  .loading.active { display: block; }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { color: var(--muted); font-size: 14px; letter-spacing: 2px; }

  /* Result */
  .result-panel {
    display: none;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: slideUp 0.5s ease;
  }

  .result-panel.active { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,51,102,0.08));
    padding: 30px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .result-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Score display */
  .score-ring {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 16px;
  }

  .score-ring svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .score-ring circle {
    fill: none;
    stroke-width: 8;
    cx: 70;
    cy: 70;
    r: 62;
  }

  .score-ring .bg-circle { stroke: var(--border); }

  .score-ring .progress-circle {
    stroke: url(#scoreGrad);
    stroke-linecap: round;
    stroke-dasharray: 389.56;
    stroke-dashoffset: 389.56;
    transition: stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 1;
    background: linear-gradient(135deg, var(--gold), #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .score-unit { font-size: 14px; color: var(--muted); }

  .score-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  /* Photo compare */
  .photos-compare {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 30px;
  }

  .photo-box {
    flex: 1;
    text-align: center;
  }

  .photo-box img {
    width: 130px;
    height: 130px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid var(--border);
  }

  .photo-box .photo-name {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
  }

  .vs-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 20px;
  }

  .vs-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--border), transparent);
  }

  .vs-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--hot);
    letter-spacing: 2px;
  }

  /* Analysis */
  .analysis-body { padding: 0 30px 30px; }

  .analysis-section { margin-bottom: 22px; }

  .analysis-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .analysis-text {
    font-size: 14px;
    line-height: 1.8;
    color: #C0C0D0;
  }

  /* Feature bars */
  .feature-bars { display: flex; flex-direction: column; gap: 10px; }

  .feature-row { display: flex; align-items: center; gap: 12px; }

  .feature-name {
    width: 80px;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }

  .feature-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .feature-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(to right, var(--gold), #FFA500);
    width: 0;
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .feature-pct {
    width: 36px;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }

  /* Wiki link */
  .wiki-link-row {
    padding: 20px 30px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wiki-link-row a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    transition: all 0.3s;
  }

  .wiki-link-row a:hover {
    border-color: var(--gold);
    background: rgba(255,215,0,0.08);
    color: var(--gold);
  }

  .wiki-label { font-size: 12px; color: var(--muted); }

  /* Share buttons */
  .share-row {
    padding: 16px 30px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .share-label { font-size: 12px; color: var(--muted); margin-right: 4px; }

  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
  }

  .share-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }

  .share-fb {
    background: #1877F2;
    color: #fff;
  }

  .share-copy {
    background: #444466;
    color: #fff;
    border: 1.5px solid var(--border);
  }
  .share-copy:hover { background: #555580; }

  .reset-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .reset-btn:hover { border-color: var(--hot); color: var(--hot); }

  /* API Key */
  .apikey-card {
    background: var(--card);
    border: 1.5px solid rgba(255,215,0,0.25);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .apikey-icon { font-size: 22px; flex-shrink: 0; }
  .apikey-body { flex: 1; min-width: 200px; }
  .apikey-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--gold); margin-bottom: 6px; }
  .apikey-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
  .apikey-input-row { display: flex; gap: 8px; }
  .apikey-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    transition: border-color 0.3s;
  }
  .apikey-input:focus { border-color: var(--gold); }
  .apikey-input::placeholder { color: var(--muted); font-family: inherit; }
  .apikey-toggle {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .apikey-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .apikey-status { font-size: 11px; margin-top: 7px; }
  .apikey-status.ok { color: #4CAF50; }
  .apikey-status.err { color: var(--hot); }
  .error-msg {
    background: rgba(255,51,102,0.1);
    border: 1px solid rgba(255,51,102,0.3);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 13px;
    color: var(--hot);
    margin-bottom: 20px;
    display: none;
  }

  .error-msg.active { display: block; }

  @media (max-width: 600px) {
    .upload-grid { grid-template-columns: 1fr; }
    h1 { font-size: 60px; }
    .photos-compare { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title-tag">✨ AI 顏值鑑定</div>
    <h1>明星臉<br>大挑戰</h1>
    <p class="subtitle">上傳你的照片 × 你心目中的明星，看看你們有多像！</p>
  </header>

  <div class="apikey-card">
    <div class="apikey-icon">🔑</div>
    <div class="apikey-body">
      <div class="apikey-label">ANTHROPIC API KEY</div>
      <div class="apikey-desc">請輸入你的 Anthropic API Key 才能使用 AI 分析功能。<br>前往 <a href="https://platform.claude.com/settings/keys" target="_blank" style="color:var(--gold)">platform.claude.com/settings/keys</a> 取得。</div>
      <div class="apikey-input-row">
        <input class="apikey-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." oninput="onApiKeyInput()">
        <button class="apikey-toggle" onclick="toggleApiKeyVisibility()" id="apiKeyToggle">👁</button>
      </div>
      <div class="apikey-status" id="apiKeyStatus"></div>
    </div>
  </div>

  <div class="upload-grid">
    <!-- My Photo -->
    <div class="upload-card" id="myCard">
      <div class="card-label">🙋 我的照片</div>
      <div class="drop-zone" id="myDrop">
        <input type="file" accept="image/*" id="myInput" onchange="handleUpload('my', this)">
        <div class="drop-icon">📸</div>
        <div class="drop-text">點擊或拖曳上傳<br><small style="font-size:11px;opacity:0.6">JPG / PNG / WEBP</small></div>
      </div>
    </div>

    <!-- Celebrity Photo -->
    <div class="upload-card" id="celebCard">
      <div class="card-label">⭐ 明星照片</div>
      <div class="drop-zone" id="celebDrop">
        <input type="file" accept="image/*" id="celebInput" onchange="handleUpload('celeb', this)">
        <div class="drop-icon">🌟</div>
        <div class="drop-text">點擊或拖曳上傳<br><small style="font-size:11px;opacity:0.6">JPG / PNG / WEBP</small></div>
      </div>
      <div class="wiki-input-wrap">
        <label>藝人名字</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="celebName" placeholder="例：陳意涵" oninput="onCelebNameInput()">
          <span id="nameStatus" style="font-size:18px;flex-shrink:0;opacity:0;transition:opacity 0.3s;"></span>
        </div>
      </div>
      <div class="wiki-input-wrap">
        <label>維基百科連結（可選，貼上後自動帶入名字）</label>
        <input type="url" id="wikiUrl" placeholder="https://zh.wikipedia.org/wiki/..." oninput="onWikiInput(this.value)">
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="action-wrap">
    <button class="btn-compare" id="compareBtn" onclick="startCompare()" disabled>
      🔍 開始比對
    </button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">AI 分析中，請稍候⋯⋯</div>
  </div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div class="result-label">相似度分析結果</div>
      <div class="score-ring" id="scoreRing">
        <svg viewBox="0 0 140 140">
          <defs>
            <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#FFD700"/>
              <stop offset="100%" stop-color="#FF3366"/>
            </linearGradient>
          </defs>
          <circle class="bg-circle" cx="70" cy="70" r="62"/>
          <circle class="progress-circle" id="progressCircle" cx="70" cy="70" r="62"/>
        </svg>
        <div class="score-number">
          <div class="score-value" id="scoreDisplay">0</div>
          <div class="score-unit">分</div>
        </div>
      </div>
      <div class="score-title" id="scoreTitle">分析中⋯</div>
    </div>

    <div class="photos-compare">
      <div class="photo-box">
        <img id="resultMyImg" src="" alt="我">
        <div class="photo-name">我</div>
      </div>
      <div class="vs-divider">
        <div class="vs-line"></div>
        <div class="vs-text">VS</div>
        <div class="vs-line"></div>
      </div>
      <div class="photo-box">
        <img id="resultCelebImg" src="" alt="明星">
        <div class="photo-name" id="resultCelebName">明星</div>
      </div>
    </div>

    <div class="analysis-body">
      <div class="analysis-section">
        <div class="analysis-title">特徵相似度</div>
        <div class="feature-bars" id="featureBars"></div>
      </div>
      <div class="analysis-section">
        <div class="analysis-title">AI 評語</div>
        <div class="analysis-text" id="analysisText"></div>
      </div>
    </div>

    <div class="share-row">
      <span class="share-label">📣 分享結果：</span>
      <button class="share-btn share-fb" onclick="shareToFacebook()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Facebook
      </button>
      <button class="share-btn share-copy" id="copyBtn" onclick="openSharePage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="copyBtnText">產生分享頁面</span>
      </button>
    </div>

    <div class="wiki-link-row">
      <div class="wiki-label">📖 深入認識這位明星</div>
      <a href="#" id="wikiLink" target="_blank" rel="noopener">前往維基百科 →</a>
      <button class="reset-btn" onclick="resetGame()">🔄 再玩一次</button>
    </div>
  </div>
</div>

<script>
  let myImageData = null;
  let celebImageData = null;

  function handleUpload(type, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const dropId = type === 'my' ? 'myDrop' : 'celebDrop';
      const drop = document.getElementById(dropId);
      
      // Remove old img
      const old = drop.querySelector('img');
      if (old) old.remove();
      drop.querySelector('.drop-icon') && (drop.querySelector('.drop-icon').style.display = 'none');
      drop.querySelector('.drop-text') && (drop.querySelector('.drop-text').style.display = 'none');

      const img = document.createElement('img');
      img.src = dataUrl;
      drop.appendChild(img);

      if (type === 'my') {
        myImageData = dataUrl;
        document.getElementById('myCard').classList.add('has-image');
      } else {
        celebImageData = dataUrl;
        document.getElementById('celebCard').classList.add('has-image');
      }

      checkReady();
    };
    reader.readAsDataURL(file);
  }

  function checkReady() {
    const btn = document.getElementById('compareBtn');
    const hasKey = document.getElementById('apiKeyInput').value.trim().startsWith('sk-ant-');
    btn.disabled = !(myImageData && celebImageData && hasKey);
  }

  function onApiKeyInput() {
    const val = document.getElementById('apiKeyInput').value.trim();
    const status = document.getElementById('apiKeyStatus');
    if (!val) { status.textContent = ''; status.className = 'apikey-status'; }
    else if (val.startsWith('sk-ant-')) { status.textContent = '✅ 格式正確'; status.className = 'apikey-status ok'; }
    else { status.textContent = '⚠️ 格式不對，應以 sk-ant- 開頭'; status.className = 'apikey-status err'; }
    checkReady();
  }

  function toggleApiKeyVisibility() {
    const input = document.getElementById('apiKeyInput');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function startCompare() {
    hideError();
    document.getElementById('resultPanel').classList.remove('active');
    document.getElementById('loading').classList.add('active');
    document.getElementById('compareBtn').disabled = true;

    try {
      const wikiUrl = document.getElementById('wikiUrl').value.trim();
      const celebNameInput = document.getElementById('celebName').value.trim();
      const knownName = celebNameInput || extractNameFromWiki(wikiUrl);

      const nameInstruction = knownName
        ? `第二張圖片是藝人「${knownName}」，請直接使用這個名字。`
        : `第二張圖片是一位明星，請根據圖片判斷名字，若無法辨識則寫「這位明星」。`;

      const celebNamePlaceholder = knownName || '明星名字';
      const jsonExample = '{\n  "score": 75,\n  "features": {\n    "臉型": 70,\n    "眼睛": 80,\n    "鼻子": 65,\n    "嘴巴": 72,\n    "整體氣質": 78\n  },\n  "celebName": "' + celebNamePlaceholder + '",\n  "comment": "評語文字"\n}';
      const prompt = '你是一個幽默又專業的 AI 外貌分析師。\n'
        + '我將提供兩張圖片：第一張是普通人，第二張是明星。\n'
        + nameInstruction + '\n'
        + '請你分析他們的臉部特徵相似度，給出：\n\n'
        + '1. 總體相似度分數（0-100的整數）\n'
        + '2. 以下5個維度的相似度（每項0-100的整數）：臉型、眼睛、鼻子、嘴巴、整體氣質\n'
        + '3. celebName：藝人名字（使用上面指定的名字）\n'
        + '4. 一段2-3句的幽默評語，用繁體中文，要有趣但不失禮貌，可以提到藝人名字\n\n'
        + '請**只**回傳以下格式的 JSON，不要有任何其他文字：\n'
        + jsonExample;

      const apiKey = document.getElementById('apiKeyInput').value.trim();
      if (!apiKey) { showError('請先輸入 Anthropic API Key！'); return; }

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: getMediaType(myImageData), data: myImageData.split(',')[1] } },
              { type: "image", source: { type: "base64", media_type: getMediaType(celebImageData), data: celebImageData.split(',')[1] } },
              { type: "text", text: prompt }
            ]
          }]
        })
      });

      if (!response.ok) throw new Error('API 錯誤');

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);

      showResult(result, wikiUrl);
    } catch (err) {
      console.error(err);
      showError('分析失敗，請確認照片上傳正確後重試。');
    } finally {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('compareBtn').disabled = false;
    }
  }

  function getMediaType(dataUrl) {
    if (dataUrl.includes('image/png')) return 'image/png';
    if (dataUrl.includes('image/webp')) return 'image/webp';
    return 'image/jpeg';
  }

  function showResult(result, wikiUrl) {
    const score = Math.min(100, Math.max(0, result.score));
    
    document.getElementById('resultMyImg').src = myImageData;
    document.getElementById('resultCelebImg').src = celebImageData;
    document.getElementById('resultCelebName').textContent = result.celebName || '明星';
    document.getElementById('analysisText').textContent = result.comment || '';

    // Score title
    let title = '普通路人';
    if (score >= 90) title = '幾乎是同一個人！';
    else if (score >= 75) title = '神似！高度相似';
    else if (score >= 60) title = '有幾分相似';
    else if (score >= 45) title = '略有相似';
    else if (score >= 30) title = '關公戰秦瓊';
    else title = '完全不同路線';
    document.getElementById('scoreTitle').textContent = title;

    // Store for share page
    lastResult = { score, celebName: result.celebName || '明星', comment: result.comment || '', title, features: result.features || {} };

    // Wiki
    const wikiLink = document.getElementById('wikiLink');
    if (wikiUrl && wikiUrl.startsWith('http')) {
      wikiLink.href = wikiUrl;
      wikiLink.style.display = 'inline-flex';
    } else {
      wikiLink.style.display = 'none';
    }

    // Feature bars
    const featureBars = document.getElementById('featureBars');
    featureBars.innerHTML = '';
    Object.entries(result.features || {}).forEach(([name, val]) => {
      const row = document.createElement('div');
      row.className = 'feature-row';
      row.innerHTML = `
        <div class="feature-name">${name}</div>
        <div class="feature-bar-bg"><div class="feature-bar-fill" data-val="${val}"></div></div>
        <div class="feature-pct">${val}</div>
      `;
      featureBars.appendChild(row);
    });

    document.getElementById('resultPanel').classList.add('active');

    // Animate score ring
    setTimeout(() => {
      const circumference = 2 * Math.PI * 62;
      const offset = circumference - (score / 100) * circumference;
      document.getElementById('progressCircle').style.strokeDashoffset = offset;
      
      // Animate number
      let current = 0;
      const target = score;
      const step = () => {
        current = Math.min(current + 2, target);
        document.getElementById('scoreDisplay').textContent = current;
        if (current < target) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);

      // Animate bars
      document.querySelectorAll('.feature-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.val + '%';
      });
    }, 100);
  }

  let lastShareText = '';

  function shareToFacebook() {
    const url = encodeURIComponent(window.location.href);
    window.open('https://www.facebook.com/sharer/sharer.php?u=' + url + '&quote=' + encodeURIComponent(lastShareText), '_blank', 'width=600,height=500');
  }

    const features = r.features || {};
    const circumference = 2 * Math.PI * 62;
    const offset = circumference - (score / 100) * circumference;

    const featureBarsHtml = Object.entries(features).map(([name, val]) => `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">

        <div style="flex:1;height:6px;background:#2A2A3A;border-radius:3px;overflow:hidden;">

        </div>
        <div style="width:30px;font-size:12px;color:#888;text-align:right;">${val}</div>
      </div>`).join('');

    const html = `<!DOCTYPE html>

  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(255,51,102,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(255,215,0,0.06) 0%,transparent 60%); pointer-events:none; }

<body>

    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('active');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('active');
  }

  // Extract name from Wikipedia URL
  function extractNameFromWiki(url) {
    if (!url) return '';
    try {
      const u = new URL(url);
      if (!u.hostname.includes('wikipedia.org')) return '';
      const parts = u.pathname.split('/');
      const title = parts[parts.length - 1];
      // Decode URI and replace underscores
      return decodeURIComponent(title).replace(/_/g, ' ');
    } catch { return ''; }
  }

  function onWikiInput(val) {
    const name = extractNameFromWiki(val.trim());
    const nameInput = document.getElementById('celebName');
    const status = document.getElementById('nameStatus');
    if (name && !nameInput.value) {
      nameInput.value = name;
      nameInput.style.borderColor = 'var(--gold)';
      status.textContent = '✅';
      status.style.opacity = '1';
      setTimeout(() => { status.style.opacity = '0'; nameInput.style.borderColor = ''; }, 2500);
    }
  }

  function onCelebNameInput() {
    // User typed manually — clear auto-fill highlight
    document.getElementById('nameStatus').style.opacity = '0';
  }


  function resetGame() {
    myImageData = null;
    celebImageData = null;

    ['myDrop', 'celebDrop'].forEach(id => {
      const drop = document.getElementById(id);
      const img = drop.querySelector('img');
      if (img) img.remove();
      const icon = drop.querySelector('.drop-icon');
      const text = drop.querySelector('.drop-text');
      if (icon) icon.style.display = '';
      if (text) text.style.display = '';
    });

    document.getElementById('myInput').value = '';
    document.getElementById('celebInput').value = '';
    document.getElementById('wikiUrl').value = '';
    document.getElementById('celebName').value = '';
    document.getElementById('nameStatus').style.opacity = '0';
    document.getElementById('myCard').classList.remove('has-image');
    document.getElementById('celebCard').classList.remove('has-image');
    document.getElementById('resultPanel').classList.remove('active');
    document.getElementById('compareBtn').disabled = true;
    hideError();

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Drag and drop
  ['myDrop', 'celebDrop'].forEach(id => {
    const drop = document.getElementById(id);
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      const type = id === 'myDrop' ? 'my' : 'celeb';
      const input = document.getElementById(type === 'my' ? 'myInput' : 'celebInput');
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      handleUpload(type, input);
    });
  });
